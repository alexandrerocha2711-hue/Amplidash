[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/melhores"
  to = "/melhores/"
  status = 301

[[redirects]]
  from = "/src/melhores"
  to = "/melhores/"
  status = 301

[[redirects]]
  from = "/src/melhores/"
  to = "/melhores/"
  status = 301

[[redirects]]
  from = "/src/melhores/index.html"
  to = "/melhores/"
  status = 301

[[redirects]]
  from = "/dash_criador"
  to = "/dash_criador/"
  status = 301

[[redirects]]
  from = "/src/dash_criador"
  to = "/dash_criador/"
  status = 301

[[redirects]]
  from = "/src/dash_criador/"
  to = "/dash_criador/"
  status = 301

[[redirects]]
  from = "/src/dash_criador/index.html"
  to = "/dash_criador/"
  status = 301

[[redirects]]
  from = "/api/melhores/state"
  to = "/.netlify/functions/melhores-state"
  status = 200

[[redirects]]
  from = "/api/melhores/apply"
  to = "/.netlify/functions/melhores-apply"
  status = 200

[[redirects]]
  from = "/api/melhores/reset"
  to = "/.netlify/functions/melhores-reset"
  status = 200

[[redirects]]
  from = "/api/melhores/saves"
  to = "/.netlify/functions/melhores-saves"
  status = 200
